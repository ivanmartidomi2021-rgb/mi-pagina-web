<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IvanStore PRO</title>

<style>
:root{
    --bg:#1e293b;         /* fondo oscuro suave */
    --card:#334155;       /* tarjetas gris azulado */
    --primary:#e2e8f0;    /* texto claro elegante */
    --secondary:#94a3b8;  /* gris suave */
    --accent:#475569;     /* acento discreto */


*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:var(--bg);color:var(--primary);}

header{
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:transparent;
}

.logo{font-size:20px;font-weight:bold;}
nav a{margin:0 10px;text-decoration:none;color:var(--secondary);}

.hero{
    padding:50px 20px;
    text-align:center;
}

.hero h1{font-size:32px;}
.hero p{color:var(--secondary);}

.productos{
    padding:20px;
    max-width:700px;
    margin:auto;
}

.lista{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.card{
    display:flex;
    align-items:center;
    background:var(--card);
    backdrop-filter:blur(10px);
    border-radius:15px;
    padding:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.card img{
    width:70px;
    height:70px;
    border-radius:12px;
    object-fit:cover;
}

.info{
    flex:1;
    margin-left:12px;
}

.info h3{font-size:15px;}
.price{font-size:14px;margin-top:3px;}

/* STOCK NUBE */
.stock{
    display:inline-block;
    background:#e2e8f0;
    padding:4px 10px;
    border-radius:20px;
    font-size:12px;
    margin-top:5px;
    color:#475569;
    box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.btn{
    background:#22c55e;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    transition:0.2s;
}
.btn:hover{
    transform:scale(1.05);
    background:#16a34a;
}

.factura{
    position:fixed;
    right:0;
    top:0;
    width:240px;
    height:100%;
    background:var(--card);
    backdrop-filter:blur(10px);
    padding:15px;
}

.item{display:flex;justify-content:space-between;margin:8px 0;font-size:13px;}

.contacto{
    padding:30px 20px;
    max-width:700px;
    margin:auto;
}

input,textarea{
    width:100%;
    margin:8px 0;
    padding:10px;
    border-radius:8px;
    border:none;
    background:#f8fafc;
}

footer{
    text-align:center;
    padding:15px;
    margin-top:20px;
    color:var(--secondary);
}
</style>
</head>

<body>

<header>
    <div class="logo">IvanStore</div>
    <nav>
        <a href="#">Inicio</a>
        <a href="#productos">Tienda</a>
        <a href="#contacto">Contacto</a>
    </nav>
</header>

<section class="hero">
    <h1>Estilo suave y moderno</h1>
    <p>Minimalismo que vende</p>
</section>

<section id="productos" class="productos">
    <h2>Productos</h2>

    <div class="lista">

        <div class="card">
            <img src="https://via.placeholder.com/100">
            <div class="info">
                <h3>Camiseta básica</h3>
                <p class="price">$15</p>
                <span class="stock">Stock: 45</span>
            </div>
            <button class="btn" onclick="agregar('Camiseta',15)">+</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/100">
            <div class="info">
                <h3>Pantalón casual</h3>
                <p class="price">$25</p>
                <span class="stock">Stock: 30</span>
            </div>
            <button class="btn" onclick="agregar('Pantalón',25)">+</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/100">
            <div class="info">
                <h3>Chaqueta ligera</h3>
                <p class="price">$40</p>
                <span class="stock">Stock: 20</span>
            </div>
            <button class="btn" onclick="agregar('Chaqueta',40)">+</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/100">
            <div class="info">
                <h3>Sudadera premium</h3>
                <p class="price">$35</p>
                <span class="stock">Stock: 25</span>
            </div>
            <button class="btn" onclick="agregar('Sudadera',35)">+</button>
        </div>

    </div>
</section>

<div class="factura">
    <h3>Carrito</h3>
    <div id="lista"></div>
    <hr>
    <h4>Total: $<span id="total">0</span></h4>

    <input type="number" id="pago" placeholder="Con cuánto paga">
    <button class="btn" onclick="calcularCambio()">Cobrar</button>
    <h4 id="cambio"></h4>
</div>
    <hr>
    <h4>Total: $<span id="total">0</span></h4>
</div>

<section id="contacto" class="contacto">
    <h2>Contacto</h2>
    <input type="text" placeholder="Nombre">
    <input type="email" placeholder="Correo">
    <textarea placeholder="Mensaje"></textarea>
    <button class="btn">Enviar</button>
</section>

<footer>
    <p>© 2026 IvanStore</p>
</footer>

<script>
let total = 0;

function agregar(nombre, precio){
    let lista = document.getElementById("lista");

    let item = document.createElement("div");
    item.classList.add("item");
    item.innerHTML = `<span>${nombre}</span><span>$${precio}</span>`;

    lista.appendChild(item);

    total += precio;
    document.getElementById("total").innerText = total;
}

function calcularCambio(){
    let pago = parseFloat(document.getElementById("pago").value);

    if(isNaN(pago)){
        alert("Ingresa el monto con el que paga");
        r
    if(pago < total){
        document.getElementById("cambio").innerText = "Falta dinero";
    } else {
        let cambio = pago - total;
        document.getElementById("cambio").innerText = "Cambio: $" + cambio.toFixed(2);
    }
}
</script>

</body>
</html>
